<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | AuditQR</title>
<meta name="description" content="Log in to your AuditQR business account to manage products and track supply chain activity."/>
<link rel="stylesheet" href="../design-tokens.css"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,500;0,700;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "bg": "#080708",
            "surface": "#111111",
            "surface-2": "#1A1A1A",
            "surface-elevated": "#272a31",
            "green": "#D6FFB7",
            "blue": "#3185FC",
            "blue-dark": "#1E4D99",
            "muted": "#77867F",
            "danger": "#FF6B6B",
            "warning": "#FFAA00",
            "border": "rgba(119,134,127,0.15)",
            "text-primary": "#E0E2EC",
            "outline-variant": "#414754"
          },
          fontFamily: {
            headline: ["Noto Serif", "serif"],
            display: ["Noto Serif", "serif"],
            body: ["Space Grotesk", "sans-serif"],
            label: ["Space Grotesk", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"]
          }
        }
      }
    };
</script>
</head>
<body class="min-h-screen flex flex-col">

<!-- Navbar — Logo only (pre-auth page) -->
<nav class="navbar">
  <div class="navbar-content">
    <a href="landing.html" class="navbar-logo" id="nav-logo">
      <span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1; color: #3185FC; font-size: 24px;'>qr_code_2</span>
      <span>AuditQR</span>
    </a>
  </div>
</nav>

<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center page-offset px-6">
<div class="w-full max-w-[420px] text-center mb-10">
<h1 class="font-display text-[40px] font-medium leading-tight mb-3 text-white">Welcome back</h1>
<p class="font-body text-[15px] text-muted">Log in to your AuditQR business account.</p>
</div>
<div class="w-full max-w-[420px] bg-surface border border-outline-variant rounded-xl px-8 py-10 border-t-2" style="border-top-color: #D6FFB7;" id="login-form-card">
<form class="space-y-6" id="login-form">
<div class="space-y-2">
<label class="form-label" for="login-email">Email</label>
<input class="w-full bg-surface-2 border border-border rounded-lg px-4 py-3 text-[14px] text-white placeholder-muted/50 focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue/30 transition-colors font-body" placeholder="you@yourbusiness.com" type="email" id="login-email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="form-label" for="login-password">Password</label>
<a class="font-label text-[11px] text-muted hover:text-white transition-colors" href="#" id="forgot-password-link">Forgot password?</a>
</div>
<input class="w-full bg-surface-2 border border-border rounded-lg px-4 py-3 text-[14px] text-white placeholder-muted/50 focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue/30 transition-colors font-body" placeholder="Your password" type="password" id="login-password"/>
</div>
<button class="w-full bg-blue hover:bg-blue-dark active:scale-[0.98] transition-all text-white font-body text-[14px] font-medium py-3 rounded-lg mt-2" type="submit" id="login-submit-btn">
          Log in
        </button>
<div class="pt-6 border-t border-border text-center">
<p class="text-[14px] text-muted font-body">
            Don't have an account?&nbsp; <a class="text-green hover:underline transition-all" href="register_upload.html" id="register-link">Register</a></p>
</div>
</form>
</div>
</main>

<!-- Footer -->
<footer class="footer-compact">
<p>© 2026 AuditQR. Built for Nigerian SMEs</p>
</footer>
</body>
</html>
