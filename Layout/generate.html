<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Generating QR Codes | AuditQR</title>
<link rel="stylesheet" href="../design-tokens.css"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,500;0,700;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "bg": "#080708", "surface": "#111111", "surface-2": "#1A1A1A",
            "surface-elevated": "#272a31", "green": "#D6FFB7", "blue": "#3185FC",
            "blue-dark": "#1E4D99", "muted": "#77867F", "danger": "#FF6B6B",
            "border": "rgba(119,134,127,0.15)",
            "text-primary": "#E0E2EC", "outline-variant": "#414754"
          },
          fontFamily: {
            headline: ["Noto Serif", "serif"], body: ["Space Grotesk", "sans-serif"],
            label: ["Space Grotesk", "sans-serif"], mono: ["JetBrains Mono", "monospace"]
          }
        }
      }
    };
</script>
<style>
    @keyframes progress-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .progress-active {
      animation: progress-pulse 1.5s ease-in-out infinite;
    }
    @keyframes outer-ring {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .ring-1 { animation: outer-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
    .ring-2 { animation: outer-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite 0.6s; }
    .ring-3 { animation: outer-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite 1.2s; }
</style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center">

<!-- Navbar — Logo only (no escape during generation) -->
<nav class="navbar">
  <div class="navbar-content">
    <a href="#" class="navbar-logo" id="nav-logo" style="pointer-events: none;">
      <span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1; color: #3185FC; font-size: 24px;'>qr_code_2</span>
      <span>AuditQR</span>
    </a>
  </div>
</nav>

<!-- Main Content -->
<main class="flex-1 flex flex-col items-center justify-center page-offset pb-16 px-6 glow-green-top">
<div class="w-full max-w-[400px] text-center">

<!-- Animated QR Spinner -->
<div class="relative w-[120px] h-[120px] mx-auto mb-12">
  <!-- Pulse rings -->
  <div class="absolute inset-0 rounded-full border border-green/30 ring-1"></div>
  <div class="absolute inset-0 rounded-full border border-green/20 ring-2"></div>
  <div class="absolute inset-0 rounded-full border border-green/10 ring-3"></div>
  <!-- Center icon -->
  <div class="absolute inset-0 flex items-center justify-center">
    <span class="material-symbols-outlined text-green text-5xl animate-spin-slow" style="font-variation-settings: 'FILL' 1;">qr_code_2</span>
  </div>
</div>

<!-- Status Text -->
<h1 class="font-headline text-2xl font-medium text-white mb-2">Generating QR codes</h1>
<p class="text-muted text-sm mb-12">Please wait — do not close this page.</p>

<!-- Progress Steps -->
<div class="text-left space-y-5 bg-surface border border-border rounded-xl p-6">
<!-- Step 1: Complete -->
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-green text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-white text-[14px]">Product details saved</span>
</div>
<!-- Step 2: In progress -->
<div class="flex items-center gap-4 progress-active">
<span class="material-symbols-outlined text-blue text-[20px] animate-spin-slow">progress_activity</span>
<span class="text-blue text-[14px] font-medium">Generating 1 Parent QR code...</span>
</div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-4 opacity-40">
<span class="material-symbols-outlined text-muted text-[20px]">radio_button_unchecked</span>
<span class="text-muted text-[14px]">Generating 12 Child QR codes</span>
</div>
<!-- Step 4: Pending -->
<div class="flex items-center gap-4 opacity-40">
<span class="material-symbols-outlined text-muted text-[20px]">radio_button_unchecked</span>
<span class="text-muted text-[14px]">Recording genesis event on blockchain</span>
</div>
</div>

</div>
</main>

</body>
</html>
