<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Item Tracking | AuditQR</title>
    <link rel="stylesheet" href="../design-tokens.css" />
    <link rel="stylesheet" href="../tailwind.css" />
    <script src="../config.js"></script>
    <script src="./toast.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,500;0,700;1,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="flex flex-col min-h-screen overflow-x-hidden">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-content">
        <a href="landing.html" class="navbar-logo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 16 16"
          >
            <path d="M0 0h16v16H0z" fill="none" />
            <g fill="#3185FC">
              <path d="M2 2h2v2H2z" />
              <path d="M6 0v6H0V0zM5 1H1v4h4zM4 12H2v2h2z" />
              <path d="M6 10v6H0v-6zm-5 1v4h4v-4zm11-9h2v2h-2z" />
              <path
                d="M10 0v6h6V0zm5 1v4h-4V1zM8 1V0h1v2H8v2H7V1zm0 5V4h1v2zM6 8V7h1V6h1v2h1V7h5v1h-4v1H7V8zm0 0v1H2V8H1v1H0V7h3v1zm10 1h-1V7h1zm-1 0h-1v2h2v-1h-1zm-4 0h2v1h-1v1h-1zm2 3v-1h-1v1h-1v1H9v1h3v-2zm0 0h3v1h-2v1h-1zm-4-1v1h1v-2H7v1z"
              />
              <path d="M7 12h1v3h4v1H7zm9 2v2h-3v-1h2v-1z" />
            </g>
          </svg>
          <span>AuditQR</span>
        </a>
        <div class="navbar-right">
          <button class="hamburger-btn" onclick="toggleSidebar()">
            <span class="material-symbols-outlined">menu</span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar Menu -->
    <div class="sidebar-menu" id="sidebarMenu">
      <div>
        <p class="sidebar-section-label">Main</p>
        <div class="space-y-1">
          <a class="sidebar-link" href="dashboard.html">
            <span class="material-symbols-outlined text-sm">dashboard</span>
            <span>Dashboard</span>
          </a>
          <a class="sidebar-link" href="products_list.html">
            <span class="material-symbols-outlined text-sm">inventory_2</span>
            <span>My Products</span>
          </a>
          <a class="sidebar-link" href="create_product.html">
            <span class="material-symbols-outlined text-sm">add_box</span>
            <span>Create Product</span>
          </a>
          <a class="sidebar-link active" href="scan_events.html">
            <span class="material-symbols-outlined text-sm">track_changes</span>
            <span>Item Tracking</span>
          </a>
        </div>
      </div>
      <div class="mt-8">
        <p class="sidebar-section-label">Account</p>
        <div class="space-y-1">
          <a class="sidebar-link" href="account_settings.html" id="sidebar-settings">
            <span class="material-symbols-outlined text-sm">settings</span>
            <span>Settings</span>
          </a>
          <a class="sidebar-link danger" href="#" onclick="logout()">
            <span class="material-symbols-outlined text-sm">logout</span>
            <span>Log out</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 page-offset pb-10">
      <div class="page-container">
        <header
          class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-4"
        >
          <div>
            <h1
              class="font-headline text-[32px] font-medium text-white mb-2 leading-tight"
            >
              Item Tracking
            </h1>
            <p class="text-muted text-[15px]">
              Registered product batches and their authentication record
            </p>
          </div>
        </header>

        <!-- Status Filter Pills -->
        <div class="flex flex-wrap gap-2 mb-6" id="status-filter-pills">
          <button
            data-status="all"
            class="status-pill active px-3 py-1.5 rounded-full text-[11px] font-medium border border-blue bg-blue/10 text-blue transition-all"
            onclick="setStatusFilter(this)"
          >All</button>
          <button
            data-status="pending"
            class="status-pill px-3 py-1.5 rounded-full text-[11px] font-medium border border-outline-variant text-muted hover:border-muted/50 transition-all"
            onclick="setStatusFilter(this)"
          >Pending</button>
          <button
            data-status="transit"
            class="status-pill px-3 py-1.5 rounded-full text-[11px] font-medium border border-outline-variant text-muted hover:border-muted/50 transition-all"
            onclick="setStatusFilter(this)"
          >In Transit</button>
          <button
            data-status="delivered"
            class="status-pill px-3 py-1.5 rounded-full text-[11px] font-medium border border-outline-variant text-muted hover:border-muted/50 transition-all"
            onclick="setStatusFilter(this)"
          >Delivered</button>
        </div>

        <div
          class="bg-surface border border-outline-variant/20 rounded-xl overflow-hidden shadow-2xl"
        >
          <div class="table-scroll">
          <table class="w-full text-left border-collapse table-xs min-w-[480px]" id="scan-events-table">
            <thead>
              <tr class="border-b border-outline-variant/20">
                <th
                  class="px-6 py-4 text-muted font-body text-[11px] uppercase tracking-widest font-medium"
                >
                  Product
                </th>
                <th
                  class="px-6 py-4 text-muted font-body text-[11px] uppercase tracking-widest font-medium"
                >
                  Units
                </th>
                <th
                  class="px-6 py-4 text-muted font-body text-[11px] uppercase tracking-widest font-medium"
                >
                  Status
                </th>
                <th
                  class="px-6 py-4 text-muted font-body text-[11px] uppercase tracking-widest font-medium"
                >
                  Last Event
                </th>
              </tr>
            </thead>
            <tbody id="scan-events-tbody">
              <tr>
                <td
                  colspan="4"
                  class="px-6 py-10 text-center text-muted text-sm"
                  id="scan-events-empty"
                >
                  Loading…
                </td>
              </tr>
            </tbody>
          </table>
          </div>
        </div>
      </div>
    </main>

    <script src="./scan_events.js"></script>
  </body>
</html>
