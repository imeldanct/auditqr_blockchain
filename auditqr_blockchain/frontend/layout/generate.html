<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Generating QR Codes | AuditQR</title>
    <link rel="stylesheet" href="../design-tokens.css" />
    <link rel="stylesheet" href="../tailwind.css" />
    <script src="../config.js"></script>
    <script src="./toast.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,500;0,700;1,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes progress-pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
      .progress-active {
        animation: progress-pulse 1.5s ease-in-out infinite;
      }
      @keyframes outer-ring {
        0% {
          transform: scale(1);
          opacity: 0.4;
        }
        100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }
      .ring-1 {
        animation: outer-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
      }
      .ring-2 {
        animation: outer-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite 0.6s;
      }
      .ring-3 {
        animation: outer-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite 1.2s;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen items-center justify-center">
    <!-- Navbar — Logo only (no escape during generation) -->
    <nav class="navbar">
      <div class="navbar-content">
        <a href="landing.html" class="navbar-logo" id="nav-logo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 16 16"
          >
            <path d="M0 0h16v16H0z" fill="none" />
            <g fill="#3185FC">
              <path d="M2 2h2v2H2z" />
              <path d="M6 0v6H0V0zM5 1H1v4h4zM4 12H2v2h2z" />
              <path d="M6 10v6H0v-6zm-5 1v4h4v-4zm11-9h2v2h-2z" />
              <path
                d="M10 0v6h6V0zm5 1v4h-4V1zM8 1V0h1v2H8v2H7V1zm0 5V4h1v2zM6 8V7h1V6h1v2h1V7h5v1h-4v1H7V8zm0 0v1H2V8H1v1H0V7h3v1zm10 1h-1V7h1zm-1 0h-1v2h2v-1h-1zm-4 0h2v1h-1v1h-1zm2 3v-1h-1v1h-1v1H9v1h3v-2zm0 0h3v1h-2v1h-1zm-4-1v1h1v-2H7v1z"
              />
              <path d="M7 12h1v3h4v1H7zm9 2v2h-3v-1h2v-1z" />
            </g>
          </svg>
          <span>AuditQR</span>
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main
      class="flex-1 flex flex-col items-center justify-center page-offset pb-16 px-6 glow-green-top"
    >
      <div class="w-full max-w-[400px] text-center">
        <!-- Animated QR Spinner -->
        <div class="relative w-[120px] h-[120px] mx-auto mb-12">
          <!-- Pulse rings -->
          <div class="absolute inset-0 rounded-full border border-green/30 ring-1"></div>
          <div class="absolute inset-0 rounded-full border border-green/20 ring-2"></div>
          <div class="absolute inset-0 rounded-full border border-green/10 ring-3"></div>
          <!-- Center icon -->
          <div class="absolute inset-0 flex items-center justify-center">
            <span
              class="material-symbols-outlined text-green text-5xl animate-spin-slow"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >qr_code_2</span
            >
          </div>
        </div>

        <!-- Status Text -->
        <h1 class="font-headline text-2xl font-medium text-white mb-2">
          Generating QR codes
        </h1>
        <p class="text-muted text-sm mb-12">Please wait — do not close this page.</p>

        <!-- Progress Steps -->
        <div
          class="text-left space-y-5 bg-surface border border-outline-variant rounded-xl p-6"
        >
          <!-- Step 1: Complete -->
          <div class="flex items-center gap-4">
            <span
              class="material-symbols-outlined text-green text-[20px]"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >check_circle</span
            >
            <span class="text-white text-[14px]">Product details saved</span>
          </div>
          <!-- Step 2: In progress -->
          <div class="flex items-center gap-4 progress-active">
            <span
              class="material-symbols-outlined text-blue text-[20px] animate-spin-slow"
              >progress_activity</span
            >
            <span class="text-blue text-[14px] font-medium"
              >Generating 1 Parent QR code...</span
            >
          </div>
          <!-- Step 3: Pending -->
          <div class="flex items-center gap-4 opacity-40">
            <span class="material-symbols-outlined text-muted text-[20px]"
              >radio_button_unchecked</span
            >
            <span class="text-muted text-[14px]" id="step3-label"
              >Generating Child QR codes</span
            >
          </div>
          <!-- Step 4: Pending -->
          <div class="flex items-center gap-4 opacity-40">
            <span class="material-symbols-outlined text-muted text-[20px]"
              >radio_button_unchecked</span
            >
            <span class="text-muted text-[14px]"
              >Recording genesis event on blockchain</span
            >
          </div>
        </div>
      </div>
    </main>

    <script src="./generate.js"></script>
  </body>
</html>
